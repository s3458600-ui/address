{% extends 'base.html' %}
{% block title %}주소록 조회 및 관리{% endblock %}
{% block content %}
<div style="display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #eee; padding-bottom: 10px;">
    <h2>📞 주소록 검색 및 관리</h2>
    <button onclick="logout()" style="background-color: #dc3545;">로그아웃</button>
</div>

<!-- 검색 바 영역 -->
<div style="margin: 20px 0;">
    <input type="text" id="searchInp" placeholder="이름 또는 전화번호 입력" style="width: 250px;">
    <button onclick="loadContacts()" style="background-color: #007BFF;">검색</button>
    <button onclick="resetSearch()" style="background-color: #6c757d;">초기화</button>
</div>

<!-- 주소 추가 영역 -->
<h3>➕ 새 연락처 등록</h3>
<div style="margin-bottom: 30px;">
    <input type="text" id="name" placeholder="이름(필수)">
    <input type="text" id="phone" placeholder="전화번호(필수)">
    <input type="email" id="email" placeholder="이메일">
    <button onclick="addContact()" style="background-color: #28a745;">추가</button>
</div>

<!-- 결과 테이블 -->
<table style="width: 100%; border-collapse: collapse;">
    <thead>
        <tr style="background-color: #f5f5f5;">
            <th style="padding: 10px; border: 1px solid #ddd; text-align: left;">이름</th>
            <th style="padding: 10px; border: 1px solid #ddd; text-align: left;">전화번호</th>
            <th style="padding: 10px; border: 1px solid #ddd; text-align: left;">이메일</th>
        </tr>
    </thead>
    <tbody id="contactTableBody"></tbody>
</table>

<!-- 기능 분리된 전용 스크립트 로드 -->
<script src="/templates/search/search.js"></script>
{% endblock %}
